name: Build and Push ES Plugin Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Custom tag suffix (e.g. v9). Defaults to short commit SHA.'
        required: false
        default: ''

env:
  REGISTRY: asia.gcr.io
  PROJECT_ID: pluto-api-362701
  IMAGE_NAME: elasticsearch-custom
  ES_VERSION: 8.17.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin ZIP
        run: ./gradlew clean build --no-daemon

      - name: Extract plugin into docker context
        run: |
          mkdir -p docker-context/plugin
          unzip -o build/distributions/es-bulk-id-export-*.zip -d docker-context/plugin/
          ls -la docker-context/plugin/

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag_suffix }}" ]; then
            SUFFIX="${{ github.event.inputs.tag_suffix }}"
          else
            SUFFIX="$(git rev-parse --short HEAD)"
          fi
          TAG="${ES_VERSION}-bulk-export-${SUFFIX}"
          IMAGE="${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "full=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${IMAGE}:${TAG}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/944835544118/locations/global/workloadIdentityPools/wif-pool/providers/github
          service_account: github-action-deployment@pluto-api-362701.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia.gcr.io --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.full }}
            ${{ steps.meta.outputs.image }}:${{ env.ES_VERSION }}-bulk-export-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.full }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image }}:${{ env.ES_VERSION }}-bulk-export-latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update the ES CRD to roll out:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "kubectl --context gke_pluto-api-362701_asia-northeast1_search-cluster \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  patch elasticsearch es-2026-03-24 --type merge \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  -p '{\"spec\":{\"image\":\"${{ steps.meta.outputs.full }}\"}}'" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
